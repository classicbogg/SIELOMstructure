<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Not Found</title>
    <link rel="stylesheet" href="../../static/css/base.css" />
    <link rel="stylesheet" href="../../static/css/pages/404.css" />
  </head>
  <body>

    <main class="page">
      <div class="glow glow--left" aria-hidden="true"></div>
      <div class="glow glow--right" aria-hidden="true"></div>

      <section class="content" aria-labelledby="title">
        <p class="code" aria-hidden="true">404</p>
        <h1 id="title" class="title">NOT FOUND</h1>
        <p class="subtitle">
          THE REQUESTED URL WAS NOT FOUND ON THE SERVER. IF YOU ENTERED THE URL MANUALLY
          PLEASE CHECK YOUR SPELLING AND TRY AGAIN.
        </p>
      </section>

      <div class="orb" aria-hidden="true">
        <div class="orb__rim"></div>
        <div class="orb__grid"></div>
        <div class="orb__shade"></div>
      </div>
    </main>
  </body>
</html>
