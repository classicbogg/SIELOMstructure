<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заказ услуги — SIELOM.WEB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/pages/order_services.css" />
</head>
<body>
  <main class="service-order">
    <section class="order-section">
      <p class="section-kicker">ЗАКАЗ УСЛУГИ</p>

      <form class="calculator" id="serviceCalculator" novalidate>
        <div class="card card-top">
          <h1 class="card-title">Калькулятор стоимости</h1>

          <div class="grid grid-top">
            <label class="field">
              <span class="sr-only">Количество страниц</span>
              <input
                id="pages"
                name="pages"
                type="number"
                min="1"
                step="1"
                value="5"
                placeholder="Кол-во страниц"
              />
            </label>

            <label class="field select-field">
              <span class="sr-only">Сроки</span>
              <select id="deadline" name="deadline">
                <option value="standard">Сроки</option>
                <option value="relaxed">До 30 дней</option>
                <option value="standard" selected>До 14 дней</option>
                <option value="urgent">До 7 дней</option>
                <option value="rush">До 3 дней</option>
              </select>
            </label>

            <label class="field select-field">
              <span class="sr-only">Тип</span>
              <select id="projectType" name="projectType">
                <option value="landing">Тип</option>
                <option value="landing" selected>Лендинг</option>
                <option value="multipage">Многостраничный сайт</option>
                <option value="shop">Интернет-магазин</option>
                <option value="corporate">Корпоративный сайт</option>
              </select>
            </label>
          </div>
        </div>

        <div class="card card-options">
          <h2 class="card-title">Дополнительные опции</h2>

          <div class="options-grid">
            <label class="checkbox-item">
              <input type="checkbox" id="designAdaptive" name="extras" value="designAdaptive" checked />
              <span class="checkbox-box"></span>
              <span class="checkbox-text">Дизайн + адаптив</span>
            </label>

            <label class="checkbox-item">
              <input type="checkbox" id="seo" name="extras" value="seo" />
              <span class="checkbox-box"></span>
              <span class="checkbox-text">SEO-основа</span>
            </label>

            <label class="checkbox-item">
              <input type="checkbox" id="integrations" name="extras" value="integrations" />
              <span class="checkbox-box"></span>
              <span class="checkbox-text">Интеграции (CRM/бот/оплата)</span>
            </label>

            <label class="checkbox-item checkbox-item-second-row">
              <input type="checkbox" id="support" name="extras" value="support" />
              <span class="checkbox-box"></span>
              <span class="checkbox-text">Поддержка 1 месяц</span>
            </label>
          </div>
        </div>

        <div class="card card-bottom">
          <div class="grid grid-bottom">
            <label class="field">
              <span class="sr-only">Имя</span>
              <input id="clientName" name="clientName" type="text" placeholder="Имя" maxlength="80" />
            </label>

            <label class="field">
              <span class="sr-only">Почта</span>
              <input id="clientEmail" name="clientEmail" type="email" placeholder="Почта" maxlength="120" />
            </label>

            <label class="field">
              <span class="sr-only">Телефон</span>
              <input id="clientPhone" name="clientPhone" type="tel" placeholder="Телефон" maxlength="30" />
            </label>
          </div>

          <div class="summary-row">
            <div class="total-box">
              <p class="total-label">Итого</p>
              <p class="total-value"><span id="totalPrice">42 000</span> руб.</p>
            </div>

            <div class="actions">
              <button type="button" class="btn btn-outline" id="copyEstimate">Скопировать</button>
              <button type="submit" class="btn btn-primary">Отправить расчет</button>
            </div>
          </div>
        </div>
      </form>

      <div class="toast" id="toast" aria-live="polite"></div>
    </section>
  </main>

  <script src="../../static/js/pages/order_services.js"></script>
</body>
</html>
