<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Designer Cards</title>
  <link rel="stylesheet" href="../../static/css/pages/Team_designer_cards.css" />
</head>
<body>
  <main class="team-grid">
    <section class="designer-card designer-card--dark">
      <div class="designer-card__content">
        <p class="designer-card__role">Web designer</p>
        <h2 class="designer-card__name">
          <span>Shinkevich</span>
          <span>Diana</span>
        </h2>

        <div class="designer-card__dots" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <p class="designer-card__footer">Infra in the Wild<br>with Luis Ramírez</p>
      </div>

      <div class="designer-card__photo designer-card__photo--light">
        <span>Photo</span>
      </div>
    </section>

    <section class="designer-card designer-card--light">
      <div class="designer-card__content">
        <p class="designer-card__role">Web designer</p>
        <h2 class="designer-card__name designer-card__name--dark">
          <span>Matveev</span>
          <span>Efim</span>
        </h2>

        <div class="designer-card__dots designer-card__dots--dark" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <p class="designer-card__footer designer-card__footer--dark">Infra in the Wild<br>with Luis Ramírez</p>
      </div>

      <div class="designer-card__photo designer-card__photo--dark">
        <span>Photo</span>
      </div>
    </section>
  </main>

  <script src="../../static/js/pages/Team_designer_cards.js"></script>
</body>
</html>
